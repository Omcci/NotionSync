version: '3.8'

services:
  web:
    build:
      context: ./web
      target: dev
    ports:
      - '9001:3000'
    volumes:
      - './web:/app'
      - '/app/node_modules'
    env_file:
      - ./web/.env.local
    environment:
      - NODE_ENV=development
